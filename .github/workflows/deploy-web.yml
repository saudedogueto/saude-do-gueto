name: Deploy Web

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web

      - name: Prepare for GitHub Pages
        run: |
          cd dist
          sed -i 's|src="/_expo/|src="./_expo/|g' index.html
          sed -i 's|</head>|<script>if(!window.location.hash||"#/"===window.location.hash||"#"===window.location.hash){window.location.replace(window.location.href.replace(/#*$/,"")+"#/(tabs)/dashboard")}</script></head>|' index.html
          sed -i 's|<title>|<link rel="manifest" href="./manifest.json"><meta name="theme-color" content="#FF8C00"><title>|' index.html
          sed -i 's|</body>|<script>if("serviceWorker"in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("./sw.js").catch(function(e){console.warn("SW:",e)})})}</script></body>|' index.html
          cp index.html 404.html
          cp ${{ github.workspace }}/public/manifest.json . || true
          cp ${{ github.workspace }}/public/icon-192.png . || true
          cp ${{ github.workspace }}/public/icon-512.png . || true
          printf 'self.addEventListener("install",(e)=>self.skipWaiting());\nself.addEventListener("activate",(e)=>e.waitUntil(clients.claim()));\nself.addEventListener("fetch",(e)=>e.respondWith(fetch(e.request)));\n' > sw.js
          touch .nojekyll
          ls -la

      - name: Push to gh-pages
        run: |
          cd dist
          git init
          git config user.name "saudedogueto"
          git config user.email "saudedogueto@users.noreply.github.com"
          git add -A
          git commit -m "Deploy $(date -u)"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin HEAD:gh-pages --force
