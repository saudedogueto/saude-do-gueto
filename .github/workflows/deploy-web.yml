name: Deploy Web

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web

      - name: Prepare for GitHub Pages
        run: |
          cd dist
          # Corrigir o index.html para usar paths relativos
          sed -i 's|src="/_expo/|src="./_expo/|g' index.html
          # Injetar script que força redirect para rota inicial (hash routing)
          sed -i 's|<div id="root"></div>|<div id="root"></div>\n<script>\n(function() {\n  // Se a URL não tem hash, redireciona para a rota inicial\n  var hash = window.location.hash;\n  if (!hash || hash === "#/" || hash === "#") {\n    window.location.hash = "#/(tabs)/dashboard";\n  }\n})();\n</script>|g' index.html
          # Copiar index.html como 404.html para roteamento SPA
          cp index.html 404.html
          # Criar .nojekyll para evitar que GitHub ignore pastas com underscore
          touch .nojekyll

      - name: Push to gh-pages
        run: |
          cd dist
          git init
          git config user.name "saudedogueto"
          git config user.email "saudedogueto@users.noreply.github.com"
          git add -A
          git commit -m "Deploy $(date -u)"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin HEAD:gh-pages --force
