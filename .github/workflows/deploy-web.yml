name: Deploy Web

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web

      - name: Prepare for GitHub Pages
        run: |
          cd dist
          # Garantir permissão e executar script de redirect
          chmod +x "$GITHUB_WORKSPACE/scripts/inject-redirect.sh"
          "$GITHUB_WORKSPACE/scripts/inject-redirect.sh" index.html
          # Verificar se o script inseriu o redirect
          if ! grep -q 'window.location.hash' index.html; then
            echo "ERRO: script de redirect não foi inserido!"
            exit 1
          fi
          # Copiar index.html como 404.html para roteamento SPA
          cp index.html 404.html
          # Criar .nojekyll
          touch .nojekyll

      - name: Push to gh-pages
        run: |
          cd dist
          git init
          git config user.name "saudedogueto"
          git config user.email "saudedogueto@users.noreply.github.com"
          git add -A
          git commit -m "Deploy $(date -u)"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin HEAD:gh-pages --force
