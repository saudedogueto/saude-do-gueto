name: Deploy Web

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web

      - name: Prepare for GitHub Pages
        run: |
          # Executar script de redirect (corrige paths, injeta hash-redirect, copia 404.html)
          chmod +x "$GITHUB_WORKSPACE/scripts/inject-redirect.sh"
          "$GITHUB_WORKSPACE/scripts/inject-redirect.sh" dist/index.html
          
          # Verificar se o script inseriu o redirect
          if ! grep -q 'window.location.hash' dist/index.html; then
            echo "ERRO: script de redirect não foi inserido!"
            grep -c '<script>' dist/index.html || true
            exit 1
          fi
          
          # Criar .nojekyll (evita que GitHub ignore _expo/)
          touch dist/.nojekyll
          
          echo "=== Conteúdo de dist/ ==="
          ls -la dist/

      - name: Push to gh-pages
        run: |
          cd dist
          git init
          git config user.name "saudedogueto"
          git config user.email "saudedogueto@users.noreply.github.com"
          git add -A
          git commit -m "Deploy $(date -u)"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin HEAD:gh-pages --force
