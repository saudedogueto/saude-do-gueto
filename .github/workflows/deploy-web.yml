name: Deploy Web

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npx expo export --platform web

      - name: Prepare for GitHub Pages
        run: |
          cd dist
          # Corrigir o index.html para usar paths relativos
          sed -i 's|src="/_expo/|src="./_expo/|g' index.html
          # Injetar script hash-redirect com Python (mais robusto que sed para multiline)
          python3 -c "
import re
with open('index.html', 'r') as f:
    content = f.read()
script = '''<script>
(function(){
  var h = window.location.hash;
  if(!h||h==='#/'||h==='#'){window.location.hash='#/(tabs)/dashboard';}
})();
</script>'''
content = content.replace('<div id="root"></div>', '<div id="root"></div>\n' + script)
with open('index.html', 'w') as f:
    f.write(content)
"
          # Copiar index.html como 404.html para roteamento SPA
          cp index.html 404.html
          # Criar .nojekyll
          touch .nojekyll

      - name: Push to gh-pages
        run: |
          cd dist
          git init
          git config user.name "saudedogueto"
          git config user.email "saudedogueto@users.noreply.github.com"
          git add -A
          git commit -m "Deploy $(date -u)"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin HEAD:gh-pages --force
